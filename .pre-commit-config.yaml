# prek (https://github.com/j178/prek) — pre-commit–compatible config
# Install hooks: prek install   (or they install on devenv enterShell)
# Keep pre-commit moon gate in sync with devenv.nix `git-hooks.hooks.pre-commit`.
default_install_hook_types: [pre-commit, pre-push, commit-msg]
repos:
  # Commit: format + check + test (matches devenv.nix git-hooks.pre-commit)
  - repo: local
    hooks:
      - id: devenv-pre-commit
        name: devenv pre-commit (moon format check test)
        # Script (not bare `bash -c '…'`) avoids prek/exec splitting; unsets hook GIT_* for nested git.
        entry: bash scripts/devenv-pre-commit-moon.sh
        language: system
        stages: [pre-commit]
        pass_filenames: false
        always_run: true
  # Pre-push: format, check, lint, build, test, audit, check-docs (via devenv)
  - repo: local
    hooks:
      - id: pre-push
        name: pre-push (moon)
        entry: devenv shell -- pre-push
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
  # Commit message format (conventional commits / commitizen)
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.6
    hooks:
      - id: commitizen
        stages: [commit-msg]
