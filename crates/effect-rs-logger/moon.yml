# https://moonrepo.dev/docs/config/project
language: 'rust'
layer: 'library'
tasks:
  check:
    deps: ['effect-rs:format', '^:check']
    command:
      - cargo
      - check
      - -p
      - effect-rs-logger
      - --all-targets
      - --all-features
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - 'examples/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  clippy:
    deps: ['^:clippy', '~:check']
    command:
      - cargo
      - clippy
      - -p
      - effect-rs-logger
      - --all-targets
      - --all-features
      - --
      - -D
      - warnings
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - 'examples/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  test:
    deps: ['^:test']
    command:
      - cargo
      - nextest
      - run
      - -p
      - effect-rs-logger
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  build:
    deps: ['^:build', '~:test']
    command:
      - cargo
      - build
      - -p
      - effect-rs-logger
      - --all-targets
      - --all-features
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - 'examples/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  examples:
    description: 'Run all crate example binaries (examples/*.rs); no-op if none'
    deps: ['~:test']
    command: 'bash'
    args:
      - '../../scripts/moon-run-crate-examples.sh'
      - 'effect-rs-logger'
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'examples/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
