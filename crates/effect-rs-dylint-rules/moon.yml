# https://moonrepo.dev/docs/config/project
# Standalone workspace (root Cargo.toml exclude); Fenix nightly + shim via enterShell EFFECT_DYLINT_MOON_PATH.
language: 'rust'
layer: 'tool'
tasks:
  check:
    toolchains: 'system'
    deps: ['effect-rs:format', '^:check']
    command:
      - env
      - 'PATH=${EFFECT_DYLINT_MOON_PATH}'
      - cargo
      - check
      - --manifest-path
      - $projectRoot/Cargo.toml
      - --all-targets
      - --all-features
    inputs:
      - 'Cargo.toml'
      - 'rust-toolchain'
      - 'src/**/*.rs'
      - 'ui/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  clippy:
    toolchains: 'system'
    deps: ['^:clippy', '~:check']
    command:
      - env
      - 'PATH=${EFFECT_DYLINT_MOON_PATH}'
      - cargo
      - clippy
      - --manifest-path
      - $projectRoot/Cargo.toml
      - --all-targets
      - --all-features
      - '--'
      - -D
      - warnings
    inputs:
      - 'Cargo.toml'
      - 'rust-toolchain'
      - 'src/**/*.rs'
      - 'ui/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  lint:
    toolchains: 'system'
    description: 'UI tests (crate excluded from root workspace; not eligible for cargo dylint -p)'
    deps: ['^:lint', '~:clippy']
    command:
      - env
      - 'PATH=${EFFECT_DYLINT_MOON_PATH}'
      - cargo
      - nextest
      - run
      - --manifest-path
      - $projectRoot/Cargo.toml
    inputs:
      - 'Cargo.toml'
      - 'rust-toolchain'
      - 'src/**/*.rs'
      - 'ui/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  test:
    toolchains: 'system'
    deps: ['^:test', '~:clippy']
    command:
      - env
      - 'PATH=${EFFECT_DYLINT_MOON_PATH}'
      - cargo
      - nextest
      - run
      - --manifest-path
      - $projectRoot/Cargo.toml
    inputs:
      - 'Cargo.toml'
      - 'rust-toolchain'
      - 'src/**/*.rs'
      - 'ui/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  build:
    toolchains: 'system'
    deps: ['^:build', '~:test']
    command:
      - env
      - 'PATH=${EFFECT_DYLINT_MOON_PATH}'
      - cargo
      - build
      - --manifest-path
      - $projectRoot/Cargo.toml
      - --all-targets
      - --all-features
    inputs:
      - 'Cargo.toml'
      - 'rust-toolchain'
      - 'src/**/*.rs'
      - 'ui/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
