[book]
title = "Typed Effects in Rust"
authors = ["effectful contributors"]
description = "Learn to build composable, testable async programs with effectful"
language = "en"

[build]
build-dir = "book"

[rust]
edition = "2024"

[output.html]
default-theme = "rust"
preferred-dark-theme = "coal"
git-repository-url = "https://github.com/EduSantosBrito/effectful"
edit-url-template = "https://github.com/EduSantosBrito/effectful/edit/main/crates/effectful/book/{path}"

[output.html.playground]
editable = true
line-numbers = true

[output.html.search]
enable = true
limit-results = 30
