[book]
title = "Typed Effects in Rust"
authors = ["effect_rs contributors"]
description = "Learn to build composable, testable async programs with effect_rs"
language = "en"
multilingual = false

[build]
build-dir = "book"

[output.html]
default-theme = "rust"
preferred-dark-theme = "coal"
git-repository-url = "https://github.com/Industrial/effect_rs"
edit-url-template = "https://github.com/Industrial/effect_rs/edit/main/crates/effect_rs/book/{path}"

[output.html.playground]
editable = true
line-numbers = true

[output.html.search]
enable = true
limit-results = 30
use-hierarchical-titles = true
