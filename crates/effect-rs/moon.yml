# https://moonrepo.dev/docs/config/project
language: 'rust'
layer: 'library'
tasks:
  check:
    deps: ['effect-rs:format', '^:check']
    command:
      - cargo
      - check
      - -p
      - effect-rs
      - --all-targets
      - --all-features
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - 'benches/**/*.rs'
      - 'examples/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  clippy:
    deps: ['^:clippy', '~:check']
    command:
      - cargo
      - clippy
      - -p
      - effect-rs
      - --all-targets
      - --all-features
      - --
      - -D
      - warnings
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - 'benches/**/*.rs'
      - 'examples/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  lint:
    description: 'Dylint: all libraries from workspace.metadata.dylint'
    deps: ['^:lint', '~:clippy']
    command: bash
    args: ['../../scripts/moon-dylint.sh', 'package', 'effect-rs']
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - '/Cargo.toml'
      - '/crates/effect-rs-dylint-rules/Cargo.toml'
      - '/crates/effect-rs-dylint-rules/rust-toolchain'
      - '/crates/effect-rs-dylint-rules/src/**/*.rs'
      - '/scripts/moon-dylint.sh'
      - '/scripts/dylint-rustup-shim/rustup'
    options:
      cache: true
      outputStyle: buffer-only-failure
  test:
    deps: ['^:test', '~:lint']
    command:
      - cargo
      - nextest
      - run
      - -p
      - effect-rs
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  build:
    deps: ['^:build', '~:test']
    command:
      - cargo
      - build
      - -p
      - effect-rs
      - --all-targets
      - --all-features
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - 'benches/**/*.rs'
      - 'examples/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  examples:
    description: 'Run all crate example binaries (examples/*.rs); no-op if none'
    deps: ['~:test']
    command: 'bash'
    args:
      - '../../scripts/moon-run-crate-examples.sh'
      - 'effect-rs'
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'examples/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
